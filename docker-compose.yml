services:
  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    networks:
      - hsbc-platform
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    environment:
      ML_LOG_LEVEL: info

  property-backend:
    build: ./property-backend
    ports:
      - "8001:8001"
    networks:
      - hsbc-platform
    depends_on:
      ml-service:
        condition: service_healthy
    environment:
      PROP_ML_SERVICE_URL: http://ml-service:8000
      PROP_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  market-backend:
    build: ./market-backend
    ports:
      - "8080:8080"
    networks:
      - hsbc-platform
    depends_on:
      ml-service:
        condition: service_healthy
    environment:
      ML_SERVICE_URL: http://ml-service:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  portal:
    build: ./portal
    ports:
      - "3000:3000"
    networks:
      - hsbc-platform
    depends_on:
      property-backend:
        condition: service_healthy
      market-backend:
        condition: service_healthy
    environment:
      # Server-side (SSR): internal Docker hostnames
      PROPERTY_BACKEND_URL: http://property-backend:8001
      MARKET_BACKEND_URL: http://market-backend:8080
      # Client-side (browser): localhost ports
      NEXT_PUBLIC_PROPERTY_BACKEND_URL: http://localhost:8001
      NEXT_PUBLIC_MARKET_BACKEND_URL: http://localhost:8080

networks:
  hsbc-platform:
    driver: bridge
